# Railway/Nixpacks build config
# Includes git, patch, python, openssl, etc. needed for the sandbox runner and gh CLI.
[phases.setup]
nixPkgs = ["nodejs_22", "python3", "git", "gnupatch", "openssl"]

[phases.install]
cmds = ["npm ci", "cd cli && npm ci && cd .."]

[phases.build]
cmds = ["npm run build", "cd cli && npm run build && cd .."]

[start]
cmd = "bash scripts/start.sh"
